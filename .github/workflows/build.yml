name: Build KeeFetch

on:
  push:
    branches: [master]
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Download KeePass portable
        shell: pwsh
        run: |
          # Use chocolatey to install KeePass instead of direct download
          choco install keepass --version=2.57.1 --no-progress -y
          $keepassDir = "C:\Program Files\KeePass Password Safe 2"
          Write-Output "KEEPASS_DIR=$keepassDir" >> $env:GITHUB_ENV

      - name: Restore NuGet packages
        run: |
          dotnet restore KeeFetch.csproj
          dotnet restore KeeFetch.Tests/KeeFetch.Tests.csproj

      - name: Build DLL
        shell: pwsh
        run: |
          msbuild KeeFetch.csproj /p:Configuration=Release /p:Platform=AnyCPU /p:ReferencePath="$env:KEEPASS_DIR"

      - name: Test
        shell: pwsh
        run: |
          dotnet build KeeFetch.Tests/KeeFetch.Tests.csproj --configuration Release --no-restore -p:ReferencePath="$env:KEEPASS_DIR"
          # Copy KeePass.exe to test output so tests can load the assembly
          Copy-Item -Path "$env:KEEPASS_DIR\KeePass.exe" -Destination "KeeFetch.Tests\bin\Release\net48\"
          dotnet test KeeFetch.Tests/KeeFetch.Tests.csproj --configuration Release --no-build

      - name: Create PLGX
        shell: pwsh
        run: |
          $plgxSrc = "$env:RUNNER_TEMP\KeeFetch"
          New-Item -ItemType Directory -Path $plgxSrc -Force | Out-Null

          # Copy only the files needed for plgx-create
          Copy-Item -Path "*.cs" -Destination $plgxSrc
          Copy-Item -Path "*.resx" -Destination $plgxSrc
          Copy-Item -Path "Properties" -Destination $plgxSrc -Recurse
          Copy-Item -Path "IconProviders" -Destination $plgxSrc -Recurse

          # KeePass plgx-create needs a legacy-style .csproj — SDK-style won't work.
          # Create a minimal legacy .csproj for PLGX generation.
          @'
          <?xml version="1.0" encoding="utf-8"?>
          <Project ToolsVersion="4.0" DefaultTargets="Build" xmlns="http://schemas.microsoft.com/developer/msbuild/2003">
            <PropertyGroup>
              <Configuration Condition=" '$(Configuration)' == '' ">Release</Configuration>
              <Platform Condition=" '$(Platform)' == '' ">AnyCPU</Platform>
              <OutputType>Library</OutputType>
              <RootNamespace>KeeFetch</RootNamespace>
              <AssemblyName>KeeFetch</AssemblyName>
              <TargetFrameworkVersion>v4.8</TargetFrameworkVersion>
            </PropertyGroup>
            <PropertyGroup Condition=" '$(Configuration)' == 'Release' ">
              <Optimize>true</Optimize>
              <DefineConstants>TRACE</DefineConstants>
            </PropertyGroup>
            <ItemGroup>
              <Reference Include="System" />
              <Reference Include="System.Core" />
              <Reference Include="System.Drawing" />
              <Reference Include="System.Windows.Forms" />
              <Reference Include="KeePass" />
            </ItemGroup>
            <ItemGroup>
              <Compile Include="**\*.cs" />
              <EmbeddedResource Include="SettingsForm.resx">
                <DependentUpon>SettingsForm.cs</DependentUpon>
              </EmbeddedResource>
            </ItemGroup>
            <Import Project="$(MSBuildToolsPath)\Microsoft.CSharp.targets" />
          </Project>
          '@ | Set-Content "$plgxSrc\KeeFetch.csproj" -Encoding UTF8

          Write-Output "=== PLGX source contents ==="
          Get-ChildItem $plgxSrc -Recurse | ForEach-Object { Write-Output $_.FullName }

          $keepassExe = "$env:KEEPASS_DIR\KeePass.exe"
          Write-Output "=== Running plgx-create ==="
          & $keepassExe --plgx-create $plgxSrc

          # plgx is created in the parent directory of the source folder
          $plgxFile = "$env:RUNNER_TEMP\KeeFetch.plgx"
          
          # Also check alternative locations
          Write-Output "=== Searching for .plgx files ==="
          Get-ChildItem "$env:RUNNER_TEMP" -Filter "*.plgx" -Recurse -ErrorAction SilentlyContinue | ForEach-Object { Write-Output $_.FullName }
          Get-ChildItem "D:\a" -Filter "*.plgx" -Recurse -ErrorAction SilentlyContinue | ForEach-Object { Write-Output $_.FullName }

          if (!(Test-Path $plgxFile)) {
            Write-Error "PLGX file not found at $plgxFile"
            exit 1
          }
          Write-Output "PLGX_PATH=$plgxFile" >> $env:GITHUB_ENV

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: KeeFetch.dll
          path: bin/Release/net48/KeeFetch.dll

      - name: Upload PLGX artifact
        uses: actions/upload-artifact@v4
        with:
          name: KeeFetch.plgx
          path: ${{ env.PLGX_PATH }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/Release/KeeFetch.dll
            ${{ env.PLGX_PATH }}
