name: Build KeeFetch

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install KeePass
        shell: pwsh
        run: |
          choco install keepass.install --version=2.57.1 --no-progress -y --allow-downgrade
          $keepassDir = "C:\Program Files\KeePass Password Safe 2"
          $kpExe = Join-Path $keepassDir "KeePass.exe"
          if (!(Test-Path $kpExe)) {
            Write-Error "KeePass.exe not found at $kpExe"
            exit 1
          }
          $version = (Get-Item $kpExe).VersionInfo.FileVersion
          Write-Output "KeePass version: $version"
          Write-Output "KEEPASS_DIR=$keepassDir" >> $env:GITHUB_ENV

      - name: Restore NuGet packages
        run: |
          dotnet restore KeeFetch.csproj
          dotnet restore KeeFetch.Tests/KeeFetch.Tests.csproj

      - name: Build and Analyze
        shell: pwsh
        run: |
          # Build with warnings as errors to enforce code quality
          msbuild KeeFetch.csproj /p:Configuration=Release /p:Platform=AnyCPU /p:ReferencePath="$env:KEEPASS_DIR" /p:TreatWarningsAsErrors=true

      - name: Test
        shell: pwsh
        run: |
          dotnet build KeeFetch.Tests/KeeFetch.Tests.csproj --configuration Release --no-restore -p:ReferencePath="$env:KEEPASS_DIR"
          Copy-Item -Path "$env:KEEPASS_DIR\KeePass.exe" -Destination "KeeFetch.Tests\bin\Release\net48\"
          dotnet test KeeFetch.Tests/KeeFetch.Tests.csproj --configuration Release --no-build

      - name: Create PLGX
        shell: pwsh
        run: |
          $plgxSrc = "$env:RUNNER_TEMP\KeeFetch"
          New-Item -ItemType Directory -Path $plgxSrc -Force | Out-Null

          # Copy only the files needed for plgx-create
          Copy-Item -Path "*.cs" -Destination $plgxSrc
          Copy-Item -Path "*.resx" -Destination $plgxSrc
          Copy-Item -Path "Properties" -Destination $plgxSrc -Recurse
          Copy-Item -Path "IconProviders" -Destination $plgxSrc -Recurse

          # KeePass plgx-create needs a legacy-style .csproj — SDK-style won't work.
          Copy-Item -Path "KeeFetch.plgx.csproj" -Destination "$plgxSrc\KeeFetch.csproj"

          Write-Output "=== PLGX source contents ==="
          Get-ChildItem $plgxSrc -Recurse | ForEach-Object { Write-Output $_.FullName }

          $keepassExe = "$env:KEEPASS_DIR\KeePass.exe"
          Write-Output "=== Running plgx-create ==="

          # Use Start-Process to wait for the GUI app to finish and capture exit code
          $proc = Start-Process -FilePath $keepassExe -ArgumentList "--plgx-create", "`"$plgxSrc`"" -Wait -PassThru -NoNewWindow
          Write-Output "KeePass exited with code: $($proc.ExitCode)"

          # plgx is created in the parent directory of the source folder
          $plgxFile = "$env:RUNNER_TEMP\KeeFetch.plgx"

          # Search in expected locations only (not entire C: drive)
          Write-Output "=== Searching for .plgx files ==="
          Get-ChildItem "$env:RUNNER_TEMP" -Filter "*.plgx" -Recurse -ErrorAction SilentlyContinue | ForEach-Object { Write-Output $_.FullName }
          Get-ChildItem "$env:GITHUB_WORKSPACE" -Filter "*.plgx" -Recurse -ErrorAction SilentlyContinue | ForEach-Object { Write-Output $_.FullName }

          # Check if it was created next to the source dir (expected behavior)
          if (!(Test-Path $plgxFile)) {
            # Also check the working directory
            $altPath = Join-Path (Get-Location) "KeeFetch.plgx"
            if (Test-Path $altPath) {
              $plgxFile = $altPath
            } else {
              Write-Error "PLGX file not found at $plgxFile or $altPath"
              exit 1
            }
          }
          Write-Output "PLGX_PATH=$plgxFile" >> $env:GITHUB_ENV

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: KeeFetch.dll
          path: bin/Release/net48/KeeFetch.dll

      - name: Upload PLGX artifact
        uses: actions/upload-artifact@v4
        with:
          name: KeeFetch.plgx
          path: ${{ env.PLGX_PATH }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/Release/net48/KeeFetch.dll
            ${{ env.PLGX_PATH }}
