name: Build KeeFetch

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install KeePass
        shell: pwsh
        run: |
          choco install keepass.install --version=2.60.0 --no-progress -y --allow-downgrade
          $keepassDir = "C:\Program Files\KeePass Password Safe 2"
          $kpExe = Join-Path $keepassDir "KeePass.exe"
          if (!(Test-Path $kpExe)) {
            Write-Error "KeePass.exe not found at $kpExe"
            exit 1
          }
          $version = (Get-Item $kpExe).VersionInfo.FileVersion
          Write-Output "KeePass version: $version"
          Write-Output "KEEPASS_DIR=$keepassDir" >> $env:GITHUB_ENV

      - name: Restore NuGet packages
        run: |
          dotnet restore KeeFetch.csproj
          dotnet restore KeeFetch.Tests/KeeFetch.Tests.csproj

      - name: Build DLL
        shell: pwsh
        run: |
          dotnet build KeeFetch.csproj --configuration Release --no-restore -p:KeePassPath="$env:KEEPASS_DIR"

      - name: Verify C# 5 compatibility
        shell: pwsh
        run: |
          dotnet build KeeFetch.csproj --configuration Release `
            -p:KeePassPath="$env:KEEPASS_DIR" `
            -p:LangVersion=5 `
            -warnaserror

      - name: Test
        shell: pwsh
        run: |
          dotnet build KeeFetch.Tests/KeeFetch.Tests.csproj --configuration Release --no-restore -p:KeePassPath="$env:KEEPASS_DIR"
          Copy-Item -Path "$env:KEEPASS_DIR\KeePass.exe" -Destination "KeeFetch.Tests\bin\Release\net48\"
          dotnet test KeeFetch.Tests/KeeFetch.Tests.csproj --configuration Release --no-build

      - name: Create PLGX
        shell: pwsh
        run: |
          $plgxSrc = "$env:RUNNER_TEMP\KeeFetch"
          New-Item -ItemType Directory -Path $plgxSrc -Force | Out-Null

          # Copy only the source files needed for plgx-create (exclude TestCompile.cs)
          Copy-Item -Path "*.cs" -Destination $plgxSrc -Exclude "TestCompile.cs"
          Copy-Item -Path "SettingsForm.resx" -Destination $plgxSrc
          Copy-Item -Path "Properties" -Destination $plgxSrc -Recurse
          Copy-Item -Path "IconProviders" -Destination $plgxSrc -Recurse
          Copy-Item -Path "IconSelection" -Destination $plgxSrc -Recurse

          # KeePass plgx-create needs a legacy-style .csproj — SDK-style won't work.
          Copy-Item -Path "KeeFetch.plgx.csproj" -Destination "$plgxSrc\KeeFetch.csproj"

          # Verify all expected source files are present
          $expectedFiles = @(
            "KeeFetchExt.cs", "FaviconDownloader.cs", "FaviconDialog.cs",
            "Configuration.cs", "SettingsForm.cs", "SettingsForm.Designer.cs",
            "Logger.cs", "Util.cs", "AndroidAppMapper.cs",
            "Properties\AssemblyInfo.cs", "KeeFetch.csproj",
            "IconSelection\IconSelector.cs", "IconSelection\IconCandidate.cs"
          )
          $missing = $expectedFiles | Where-Object { !(Test-Path (Join-Path $plgxSrc $_)) }
          if ($missing) {
            Write-Error "Missing files in PLGX staging: $($missing -join ', ')"
            exit 1
          }

          Write-Output "=== PLGX source contents ==="
          Get-ChildItem $plgxSrc -Recurse | ForEach-Object { Write-Output $_.FullName }

          $keepassExe = "$env:KEEPASS_DIR\KeePass.exe"
          Write-Output "=== Running plgx-create ==="
          $proc = Start-Process -FilePath $keepassExe -ArgumentList "--plgx-create", "`"$plgxSrc`"" -Wait -PassThru -NoNewWindow
          Write-Output "KeePass exited with code: $($proc.ExitCode)"

          if ($proc.ExitCode -ne 0) {
            Write-Error "KeePass plgx-create failed with exit code $($proc.ExitCode)"
            exit 1
          }

          # KeePass creates the plgx next to the source folder, named after the folder
          $plgxFile = "$env:RUNNER_TEMP\KeeFetch.plgx"

          if (!(Test-Path $plgxFile)) {
            Write-Output "=== Searching for .plgx files ==="
            Get-ChildItem "$env:RUNNER_TEMP" -Filter "*.plgx" -Recurse -ErrorAction SilentlyContinue | ForEach-Object { Write-Output $_.FullName }
            Write-Error "PLGX file not found at $plgxFile"
            exit 1
          }

          $fileInfo = Get-Item $plgxFile
          Write-Output "PLGX created: $plgxFile ($($fileInfo.Length) bytes)"
          Write-Output "PLGX_PATH=$plgxFile" >> $env:GITHUB_ENV

      - name: Verify PLGX
        shell: pwsh
        run: |
          $plgxFile = $env:PLGX_PATH
          $data = [System.IO.File]::ReadAllBytes($plgxFile)

          # Dump PLGX header (TLV entries) for debugging
          Write-Output "=== PLGX header ($($data.Length) bytes) ==="
          $pos = 12
          while ($pos + 6 -lt $data.Length) {
            $type = [BitConverter]::ToUInt16($data, $pos)
            $len  = [BitConverter]::ToInt32($data, $pos + 2)
            if ($type -eq 0 -and $len -eq 0) { Write-Output "[$pos] END"; break }

            $desc = switch ($type) {
              1 { "FileUuid" }; 2 { "BaseFileName" }; 3 { "PrereqOs" }
              4 { "FileEntry" }; 5 { "PrereqKP" }; 6 { "CreationTime" }
              7 { "GeneratorName" }; 8 { "GeneratorVersion" }
              default { "Unknown" }
            }

            if ($type -ne 4) {
              $raw = [BitConverter]::ToString($data, $pos + 6, [Math]::Min($len, 32))
              Write-Output "[$pos] Type=$type ($desc) Len=$len Data=$raw"
            } else {
              $sp = $pos + 6
              $st = [BitConverter]::ToUInt16($data, $sp); $sp += 2
              $nl = [BitConverter]::ToInt32($data, $sp);  $sp += 4
              $nm = [System.Text.Encoding]::UTF8.GetString($data, $sp, $nl)
              Write-Output "[$pos] Type=4 (FileEntry) Len=$len Name=$nm"
            }
            $pos += 6 + $len
          }

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: KeeFetch.dll
          path: bin/Release/net48/KeeFetch.dll

      - name: Upload PLGX artifact
        uses: actions/upload-artifact@v4
        with:
          name: KeeFetch.plgx
          path: ${{ env.PLGX_PATH }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/Release/net48/KeeFetch.dll
            ${{ env.PLGX_PATH }}
