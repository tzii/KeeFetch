name: Build KeeFetch

on:
  push:
    branches: [master]
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore

      - name: Download KeePass portable
        shell: pwsh
        run: |
          # Use chocolatey to install KeePass instead of direct download
          choco install keepass --version=2.57.1 --no-progress -y
          $keepassDir = "C:\Program Files\KeePass Password Safe 2"
          Write-Output "KEEPASS_DIR=$keepassDir" >> $env:GITHUB_ENV

      - name: Build DLL
        shell: pwsh
        run: |
          msbuild KeeFetch.csproj /p:Configuration=Release /p:Platform=AnyCPU /p:ReferencePath="$env:KEEPASS_DIR"

      - name: Create PLGX
        shell: pwsh
        run: |
          $plgxSrc = "$env:RUNNER_TEMP\KeeFetch"
          New-Item -ItemType Directory -Path $plgxSrc -Force | Out-Null

          # Copy only the files needed for plgx-create
          Copy-Item -Path "*.cs" -Destination $plgxSrc
          Copy-Item -Path "*.csproj" -Destination $plgxSrc
          Copy-Item -Path "*.resx" -Destination $plgxSrc
          Copy-Item -Path "Properties" -Destination $plgxSrc -Recurse
          Copy-Item -Path "IconProviders" -Destination $plgxSrc -Recurse

          $keepassExe = "$env:KEEPASS_DIR\KeePass.exe"
          & $keepassExe --plgx-create $plgxSrc

          # plgx is created in the parent directory of the source folder
          $plgxFile = "$env:RUNNER_TEMP\KeeFetch.plgx"
          if (!(Test-Path $plgxFile)) {
            Write-Error "PLGX file not found at $plgxFile"
            exit 1
          }
          Write-Output "PLGX_PATH=$plgxFile" >> $env:GITHUB_ENV

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: KeeFetch.dll
          path: bin/Release/KeeFetch.dll

      - name: Upload PLGX artifact
        uses: actions/upload-artifact@v4
        with:
          name: KeeFetch.plgx
          path: ${{ env.PLGX_PATH }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/Release/KeeFetch.dll
            ${{ env.PLGX_PATH }}
